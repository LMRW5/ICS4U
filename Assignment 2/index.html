<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/3x.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubic Solver</title>
</head>

<body>
  <div class = "topPortion">
    <h1>Cubic Solver</h1>
      <form class="inputForm">
        <label for="a">a:</label>
        <input type="number" id="a" required></input>
        <label for="b">b:</label>
        <input type="number" id="b" required></input>
        <label for="c">c:</label>
        <input type="number" id="c" required></input>
        <label for="d">d:</label>
        <input type="number" id="d" required></input>
        <input type="submit" id="submittedform" value="Submit" disabled>
      </form>
  </div>
  <div class="flex-container">
    <h2 id = "Function"></h2>
  </div>
  <div class="flex-container">
    <table id="results">
      <div class = "topTable">
      <tr>
        <th>p</th>
        <td id="p"></td>
      </tr>
      <tr>
        <th>q</th>
        <td id="q"></td>
      </tr>
      <tr>
        <th>Discriminant</th>
        <td id="discriminant"></td>
      </tr>
    </div>
      <tr class="lower-container">
        <th>Value</th>
        <th>x</th>
        <th>y</th>

      </tr>
      <tr>
        <th>Root 1</th>
        <td id="Root1x"></td>
        <td id="Root1y"></td>
      </tr>
      <tr>
        <th>Root 2</th>
        <td id="Root2x"></td>
        <td id="Root2y"></td>

      </tr>
      <tr>
        <th>Root 3</th>
        <td id="Root3x"></td>
        <td id="Root3y"></td>

      </tr>
    </table>
    <canvas id="graph" width="600" height="400"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
