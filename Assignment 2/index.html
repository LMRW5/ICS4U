<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>assignment-2</title>
</head>

<body>
  <div>
    <h1>Cubic Solver</h1>
    <div>
      <form>
        <label for="a">a:</label><br>
        <input type="number" id="a" required></input><br>
        <label for="b">b:</label><br>
        <input type="number" id="b" required></input><br>
        <label for="c">c:</label><br>
        <input type="number" id="c" required></input><br>
        <label for="d">d:</label><br>
        <input type="number" id="d" required></input><br>
<input type="submit" id="submittedform" value="Submit" disabled>
      </form>
    </div>
  </div>
  <div class="flex-container">
  <table id="results">
  <tr>
    <th>p</th>
    <td id="p"></td>
  </tr>
  <tr>
    <th>q</th>
    <td id="q"></td>
  </tr>
  <tr>
    <th>Discriminant</th>
    <td id="discriminant"></td>
  </tr>
  <tr>
    <th>Value</th>
    <td>x</td>
    <td>y</td>

  </tr>
  <tr>
    <th>Root 1</th>
    <td id="Root1x"></td>
    <td id="Root1y"></td>
  </tr>
  <tr>
    <th>Root 2</th>
    <td id="Root2x"></td>
    <td id="Root2y"></td>

  </tr>
  <tr>
    <th>Root 3</th>
    <td id="Root3x"></td>
    <td id="Root3y"></td>

  </tr>
</table>
  <canvas id="graph" width="600" height="400"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
